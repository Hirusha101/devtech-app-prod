name: "DevSecOps Enterprise Security & Compliance Pipeline"

on:
  push:
    branches: [ "main" ]

jobs:
  Security-And-Deployment:
    name: "Automated Scan & Cloud Deployment"
    runs-on: ubuntu-latest

    steps:
    - name: "Step 1: Check out Application Source Code"
      uses: actions/checkout@v3

    - name: "Step 2: Run Software Composition Analysis (SCA via Trivy)"
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scanners: 'vuln,secret,config' # UPDATED: Replaces the deprecated security-checks input
        format: 'table'
        exit-code: '0' # Keeps pipeline active for testing; change to '1' to enforce hard failure blocks
        severity: 'CRITICAL,HIGH'

    - name: "Step 3: Secure Production Deployment to Azure"
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'devtech-prod-app' # CRUCIAL: Make sure this matches your exact Azure App Service Name!
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
