name: "DevSecOps Enterprise Security & Compliance Pipeline"

on:
  push:
    branches: [ "main" ]

jobs:
  Security-And-Deployment:
    name: "Automated Scan & Cloud Deployment"
    runs-on: ubuntu-latest

    steps:
    - name: "Step 1: Check out Application Source Code"
      uses: actions/checkout@v3

    - name: "Step 2: Run Software Composition Analysis (SCA via Trivy)"
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        security-checks: 'vuln,secret,config'
        format: 'table'
        exit-code: '1' # CRITICAL HARD GATE: Enforces a pipeline failure if vulnerabilities are found!
        severity: 'CRITICAL,HIGH'

    - name: "Step 5: Secure Production Deployment to Azure"
      uses: azure/webapps-deploy@v2
      with:
        app-name: 'software-company-prod-app' # Must match your exact Azure App Service name
        publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
